<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:400px;
    background:linear-gradient(135deg,#1e90ff,#00bfff);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
}

.hero button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:white;
    color:#1e90ff;
    font-weight:bold;
    cursor:pointer;
}

.products{
    padding:50px;
}

.products h2{
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#1e90ff;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.buy{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    background:#1e90ff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <div class="logo">ShopX</div>

    <nav>
        <a href="#">Ana Sayfa</a>
        <a href="#">Ürünler</a>
        <a href="#">Sepet</a>
        <a href="#">Giriş Yap</a>
    </nav>
</header>

<section class="hero">
    <h1>Büyük İndirimler Başladı</h1>
    <p>Binlerce üründe fırsatlar seni bekliyor.</p>
    <button>Alışverişe Başla</button>
</section>

<section class="products">
    <h2>Popüler Ürünler</h2>

    <div class="grid">

        <div class="card">
            <img src="https://picsum.photos/300/200?1">
            <div class="card-content">
                <h3>Kulaklık</h3>
                <p>Yüksek ses kalitesi.</p>
                <div class="price">₺999</div>
                <button class="buy">Sepete Ekle</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?2">
            <div class="card-content">
                <h3>Telefon</h3>
                <p>Yeni nesil akıllı telefon.</p>
                <div class="price">₺19.999</div>
                <button class="buy">Sepete Ekle</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?3">
            <div class="card-content">
                <h3>Laptop</h3>
                <p>Oyun ve iş için güçlü performans.</p>
                <div class="price">₺34.999</div>
                <button class="buy">Sepete Ekle</button>
            </div>
        </div>

    </div>
</section>

<footer>
    © 2026 ShopX - Tüm Hakları Saklıdır
</footer>

</body>
</html>
